---
- name: Installer ACL (requis pour become_user avec Ansible)
  ansible.builtin.apt:
    name: acl
    state: present
    update_cache: false

- name: Installer PostgreSQL et la librairie Python requise par Ansible
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-contrib
      - python3-psycopg2
    state: present
    update_cache: true

- name: Démarrer et activer PostgreSQL au boot
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Détecter la version de PostgreSQL
  ansible.builtin.command: ls /etc/postgresql
  register: pg_dir
  changed_when: false

- name: Enregistrer la version détectée
  ansible.builtin.set_fact:
    pg_version: "{{ pg_dir.stdout_lines[0] }}"

- name: Autoriser PostgreSQL à écouter sur le réseau
  community.postgresql.postgresql_set:
    name: listen_addresses
    value: "*"
  become: true
  become_user: postgres
  notify: Redemarrer PostgreSQL

- name: Créer l'utilisateur de la base de données
  community.postgresql.postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_pass }}"
    state: present
  become: true
  become_user: postgres

- name: Créer la base de données
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    owner: "{{ db_user }}"
    state: present
  become: true
  become_user: postgres

- name: Autoriser uniquement la VM web à se connecter
  community.postgresql.postgresql_pg_hba:
    dest: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
    contype: host
    databases: "{{ db_name }}"
    users: "{{ db_user }}"
    source: "{{ web_private_ip }}/32"
    method: scram-sha-256
  notify: Redemarrer PostgreSQL
