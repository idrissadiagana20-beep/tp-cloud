#cloud-config
# cloud-init : prépare la VM dès le premier démarrage.
# On reste volontairement MINIMAL : juste de quoi rendre la machine
# "prête à l'emploi" pour qu'Ansible puisse ensuite prendre le relais.

package_update: true
package_upgrade: true

packages:
  - python3       # indispensable : Ansible se connecte en SSH et exécute du Python
  - python3-apt   # permet à Ansible de gérer les paquets apt proprement

timezone: Europe/Paris

# Petit marqueur horodaté : preuve visible que cloud-init a bien tourné
# (parfait pour ta capture d'écran du critère cloud-init = 4 points).
runcmd:
  - echo "cloud-init OK le $(date)" > /etc/tp-cloud-init.done
