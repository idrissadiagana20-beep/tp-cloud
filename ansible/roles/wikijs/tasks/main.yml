---
# Rôle Wiki.js : installe Node.js, télécharge Wiki.js et le lance en service.

- name: Installer les prérequis
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present
    update_cache: true

# --- Installation de Node.js via le dépôt officiel NodeSource ---
- name: Créer le dossier des clés APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Télécharger la clé GPG de NodeSource
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Ajouter le dépôt NodeSource (Node.js {{ node_version }}.x)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main"
    filename: nodesource
    state: present

- name: Installer Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

# --- Utilisateur et dossier dédiés à Wiki.js ---
- name: Créer le groupe système wikijs
  ansible.builtin.group:
    name: wikijs
    system: true

- name: Créer l'utilisateur système wikijs
  ansible.builtin.user:
    name: wikijs
    group: wikijs
    system: true
    home: "{{ wikijs_home }}"
    shell: /usr/sbin/nologin

- name: Créer le dossier d'installation
  ansible.builtin.file:
    path: "{{ wikijs_home }}"
    state: directory
    owner: wikijs
    group: wikijs
    mode: "0755"

# --- Téléchargement et configuration de Wiki.js ---
- name: Télécharger et extraire la dernière version de Wiki.js
  ansible.builtin.unarchive:
    src: https://github.com/Requarks/wiki/releases/latest/download/wiki-js.tar.gz
    dest: "{{ wikijs_home }}"
    remote_src: true
    owner: wikijs
    group: wikijs
    creates: "{{ wikijs_home }}/server"   # idempotence : ne re-télécharge pas si déjà présent

- name: Déposer le fichier de configuration Wiki.js
  ansible.builtin.template:
    src: config.yml.j2
    dest: "{{ wikijs_home }}/config.yml"
    owner: wikijs
    group: wikijs
    mode: "0640"
  notify: Redemarrer Wikijs

- name: Installer le service systemd de Wiki.js
  ansible.builtin.template:
    src: wikijs.service.j2
    dest: /etc/systemd/system/wikijs.service
    mode: "0644"
  notify:
    - Recharger systemd
    - Redemarrer Wikijs

- name: Activer et démarrer Wiki.js au boot
  ansible.builtin.service:
    name: wikijs
    state: started
    enabled: true
