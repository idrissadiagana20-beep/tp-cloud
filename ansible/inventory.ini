# La VM qui héberge Wiki.js (serveur web)
[web]
wiki ansible_host=10.0.50.50

# La VM qui héberge la base de données PostgreSQL
[db]
database ansible_host=10.0.50.51

# Variables communes : connexion directe depuis le Proxmox
[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=/root/.ssh/tp_cloud
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
